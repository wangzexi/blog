<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Zexi's Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #2d7ff9; }

    /* 文章元信息 */
    .blog-meta {
      color: #999;
      font-size: 13px;
      margin-top: -6px;
      margin-bottom: 20px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .blog-meta span + span::before {
      content: "·";
      margin-right: 6px;
      color: #ccc;
    }

    /* 面包屑 */
    .blog-breadcrumb {
      font-size: 13px;
      color: #999;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    .blog-breadcrumb a { color: var(--theme-color, #2d7ff9); text-decoration: none; }
    .blog-breadcrumb a:hover { text-decoration: underline; }
    .blog-breadcrumb .sep { color: #ccc; }
    .blog-breadcrumb .current { color: #333; }

    /* ===== 首页时间线 ===== */
    .home-page .markdown-section h1 {
      font-size: 2em;
      font-weight: 500;
      margin-bottom: 0.4em;
    }
    .home-page .markdown-section blockquote {
      color: #666;
      font-size: 15px;
      border-left: none;
      margin: 0 0 2em 0;
      padding: 0;
    }
    .home-page .markdown-section h2 {
      font-size: 1.5em;
      font-weight: 500;
      margin: 2em 0 0.8em;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--theme-color, #2d7ff9);
    }
    .home-page .markdown-section h3 {
      font-size: 1em;
      font-weight: 500;
      color: #555;
      margin: 1.4em 0 0.6em;
    }
    .home-page .markdown-section ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }
    .home-page .markdown-section ul li {
      font-size: 15px;
      line-height: 2;
      padding: 2px 0;
    }
    .home-page .markdown-section ul li .tl-date {
      color: #aaa;
      font-size: 13px;
      font-family: ui-monospace, SF Mono, Menlo, Consolas, monospace;
      margin-right: 8px;
    }
    .home-page .markdown-section ul li a {
      color: #333;
      text-decoration: none;
      font-size: 15px;
      transition: color 0.15s;
    }
    .home-page .markdown-section ul li a:hover {
      color: var(--theme-color, #2d7ff9);
    }

    /* ===== 侧边栏放在右侧 ===== */
    .sidebar {
      left: auto !important;
      right: 0 !important;
      border: none !important;
    }
    .sidebar-toggle { display: none !important; }
    .content {
      left: 0 !important;
      right: 300px !important;
      width: auto !important;
    }

    /* 首页无侧边栏 */
    .home-page .sidebar { display: none !important; }
    .home-page .content { right: 0 !important; }

    .app-name { display: none !important; }
    .sidebar-nav { padding-top: 12px; }
    .sidebar-nav ul { margin: 0; }

    .blog-footer {
      text-align: center;
      padding: 40px 0 48px;
      font-size: 13px;
      color: #999;
    }
    .blog-footer a { color: #999; text-decoration: none; }
    .blog-footer a:hover { color: var(--theme-color, #2d7ff9); }
  </style>
</head>
<body>
  <div id="app">加载中…</div>
  <script>
    window.$docsify = {
      name: '',
      homepage: 'home.md',
      loadSidebar: true,
      subMaxLevel: 3,
      loadNavbar: false,
      auto2top: true,
      plugins: [],
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="assets/blog.js"></script>
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: true });
    window.mermaid = mermaid;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>
</body>
</html>
