<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Zexi's Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #2d7ff9; }

    /* 文章元信息 */
    .blog-meta {
      color: #999;
      font-size: 13px;
      margin-top: -6px;
      margin-bottom: 20px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .blog-meta span + span::before {
      content: "·";
      margin-right: 6px;
      color: #ccc;
    }

    /* 面包屑 */
    .blog-breadcrumb {
      font-size: 13px;
      color: #999;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    .blog-breadcrumb a { color: var(--theme-color, #2d7ff9); text-decoration: none; }
    .blog-breadcrumb a:hover { text-decoration: underline; }
    .blog-breadcrumb .sep { margin: 0 6px; color: #ccc; }
    .blog-breadcrumb .current { color: #333; }

    /* 首页时间线 */
    .markdown-section h2 {
      margin-top: 40px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--theme-color, #2d7ff9);
    }
    .markdown-section h3 {
      margin-top: 24px;
      color: #555;
    }

    /* ===== 侧边栏折叠 ===== */
    .sidebar {
      transition: transform 0.25s ease !important;
      transform: translateX(-100%) !important;
      z-index: 20 !important;
    }
    .sidebar-toggle { display: none !important; }
    .content {
      left: 0 !important;
      width: 100% !important;
      transition: left 0.25s ease, width 0.25s ease !important;
    }
    .sidebar-open .sidebar { transform: translateX(0) !important; }
    .sidebar-open .content {
      left: 300px !important;
      width: calc(100% - 300px) !important;
    }

    /* 首页无侧边栏 */
    .home-page .sidebar { display: none !important; }
    .home-page .content { left: 0 !important; width: 100% !important; }

    /* 侧边栏展开按钮 */
    .sidebar-trigger {
      position: fixed;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      z-index: 30;
      width: 28px;
      height: 48px;
      background: var(--theme-color, #2d7ff9);
      color: #fff;
      border: none;
      border-radius: 0 6px 6px 0;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
      transition: opacity 0.2s, left 0.25s ease;
      padding: 0;
      line-height: 1;
    }
    .sidebar-trigger:hover { opacity: 1; }
    .sidebar-open .sidebar-trigger { left: 300px; }

    .sidebar-nav { padding-top: 12px; }
    .sidebar-nav ul { margin: 0; }

    .blog-footer {
      text-align: center;
      padding: 40px 0 48px;
      font-size: 13px;
      color: #999;
    }
    .blog-footer a { color: #999; text-decoration: none; }
    .blog-footer a:hover { color: var(--theme-color, #2d7ff9); }
  </style>
</head>
<body>
  <div id="app">加载中…</div>
  <button class="sidebar-trigger" id="sidebarTrigger" title="目录">☰</button>
  <script>
    window.$docsify = {
      name: "Zexi's Blog",
      homepage: 'home.md',
      loadSidebar: true,
      subMaxLevel: 3,
      loadNavbar: false,
      auto2top: true,
      plugins: [],
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="assets/blog.js"></script>
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: true });
    window.mermaid = mermaid;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>
</body>
</html>
