<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Zexi's Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #ff6f9e; }

    /* ===== HOME PAGE ===== */
    .home-page .markdown-section h1 a,
    .home-page .markdown-section h1 a span { font-size: inherit !important; }

    .home-page .markdown-section h1,
    .home-page .markdown-section h2,
    .home-page .markdown-section h3,
    .home-page .markdown-section h4 {
      font-weight: 400 !important;
    }
    .home-page .markdown-section h1 {
      font-size: 80px !important;
      font-weight: 300 !important;
      margin-bottom: 0.15em;
      line-height: 1.2;
    }
    .home-page .markdown-section blockquote {
      color: #777;
      font-size: 14px;
      font-weight: 300;
      border-left: none;
      margin: 0 0 2em 0;
      padding: 0;
      line-height: 1.7;
    }
    .home-page .markdown-section blockquote p { font-weight: 300 !important; }
    .home-page .markdown-section h2 {
      font-size: 1.5em;
      margin: 2em 0 0.8em;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--theme-color);
    }
    .home-page .markdown-section h3 {
      font-size: 1em;
      color: #555;
      margin: 1.4em 0 0.6em;
    }
    .home-page .markdown-section ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }
    .home-page .markdown-section ul li {
      font-size: 15px;
      line-height: 2;
      padding: 2px 0;
    }
    .home-page .markdown-section ul li .tl-date {
      color: #aaa;
      font-size: 13px;
      font-family: ui-monospace, SF Mono, Menlo, Consolas, monospace;
      margin-right: 8px;
    }
    .home-page .markdown-section a {
      color: #333 !important;
      text-decoration: none !important;
      font-size: 13px;
      border-bottom: none !important;
      font-weight: 400 !important;
    }
    .home-page .markdown-section a:hover {
      color: var(--theme-color) !important;
      text-decoration: underline !important;
    }

    /* ===== GLOBAL ===== */
    .sidebar { display: none !important; }
    .sidebar-toggle { display: none !important; }
    .content { left: 0 !important; right: 0 !important; }
    .markdown-section a { color: var(--theme-color) !important; }
    .markdown-section hr { border-bottom-width: 1px !important; }
    .markdown-section h2 { border-bottom-width: 1px !important; }
    .markdown-section blockquote { border-left-width: 0 !important; }

    .blog-footer {
      text-align: center;
      padding: 40px 0 48px;
      font-size: 13px;
      color: #999;
    }
    .blog-footer a { color: #999; text-decoration: none; }
    .blog-footer a:hover { color: var(--theme-color); }

    @media screen and (max-width: 900px) {
      .markdown-section {
        max-width: 100% !important;
        padding: 20px 20px 32px !important;
      }
      .home-page .markdown-section h1 { font-size: 80px !important; }
      .home-page .markdown-section h2 { margin-top: 1.6em; }
      .home-page .markdown-section ul li,
      .home-page .markdown-section a { font-size: 13px !important; }
    }
  </style>
</head>
<body>
  <div id="app">加载中…</div>
  <script>
    window.$docsify = {
      name: '',
      homepage: 'home.md',
      loadSidebar: false,
      loadNavbar: false,
      auto2top: true,
      plugins: [],
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="assets/blog.js?v=5"></script>
</body>
</html>
